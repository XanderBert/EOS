name: CMake Build

on: [push, pull_request]

env:
  VULKAN_VERSION: 1.4.304.1
  VULKAN_COMPONENTS: Vulkan-Headers, Vulkan-Loader
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-lib:
    name: Linux Lib (${{ matrix.display_server }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        display_server: [Wayland, X11]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: ${{ env.VULKAN_VERSION }}
          vulkan-components: ${{ env.VULKAN_COMPONENTS }}
          vulkan-use-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          if [ "${{ matrix.display_server }}" = "Wayland" ]; then
            sudo apt-get install -y libgl1-mesa-dev libwayland-dev wayland-protocols libxkbcommon-dev
          else
            sudo apt-get install -y xorg-dev
          fi

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: linux-${{ matrix.display_server }}-${{ env.BUILD_TYPE }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            linux-${{ matrix.display_server }}-${{ env.BUILD_TYPE }}-

      - name: Configure
        run: |
          cmake -B build \
            -DEOS_BUILD_EXAMPLES=OFF \
            -DUSE_WAYLAND=${{ matrix.display_server == 'Wayland' && 'ON' || 'OFF' }} \
            -DUSE_X11=${{ matrix.display_server == 'X11' && 'ON' || 'OFF' }} \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-linux-${{ matrix.display_server }}
          path: build/
          retention-days: 7

  windows-lib:
    name: Windows Lib
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: ${{ env.VULKAN_VERSION }}
          vulkan-components: ${{ env.VULKAN_COMPONENTS }}
          vulkan-use-cache: true

      - uses: lukka/get-cmake@latest

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: windows-${{ env.BUILD_TYPE }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            windows-${{ env.BUILD_TYPE }}-

      - name: Configure
        run: |
          cmake -B build \
            -DEOS_BUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-windows
          path: build/
          retention-days: 7